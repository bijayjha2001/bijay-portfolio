<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Dance Competition</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f0f0f;
color:white;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#111;
padding:20px;
}

.sidebar h2{
color:#ffd700;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:10px;
background:#1a1a1a;
border-radius:6px;
}

.sidebar a:hover{
background:#ffd700;
color:#000;
}

/* MAIN */
.main{
margin-left:240px;
padding:20px;
}

h1{
color:#ffd700;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
border:1px solid #333;
}

.card h3{
color:#ffd700;
}

/* TABLE */
table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:#1a1a1a;
}

th,td{
padding:12px;
border:1px solid #333;
text-align:left;
}

th{
background:#ffd700;
color:#000;
}

.status{
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.paid{
background:green;
}

.pending{
background:red;
}

/* TOP BAR */
.topbar{
background:#111;
padding:15px;
border-radius:10px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#ffd700;
border:none;
padding:10px 15px;
cursor:pointer;
font-weight:bold;
border-radius:6px;
}

button:hover{
background:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🎛 Admin Panel</h2>
<a href="#">Dashboard</a>
<a href="#">Registrations</a>
<a href="#">Payments</a>
<a href="#">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
<button onclick="addDummy()">+ Add Test Entry</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Total Registrations</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Payments Received</h3>
<p id="paid">0</p>
</div>

<div class="card">
<h3>Pending Payments</h3>
<p id="pending">0</p>
</div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Age</th>
<th>Category</th>
<th>Payment</th>
</tr>
</thead>

<tbody id="tableData">
</tbody>
</table>

</div>

<script>
let data = [];

function render(){
let table = document.getElementById("tableData");
table.innerHTML = "";

let paid = 0;
let pending = 0;

data.forEach(item=>{
let row = `<tr>
<td>${item.name}</td>
<td>${item.mobile}</td>
<td>${item.age}</td>
<td>${item.category}</td>
<td><span class="status ${item.payment}">${item.payment}</span></td>
</tr>`;

table.innerHTML += row;

if(item.payment === "paid") paid++;
else pending++;
});

document.getElementById("total").innerText = data.length;
document.getElementById("paid").innerText = paid;
document.getElementById("pending").innerText = pending;
}

/* dummy data */
function addDummy(){
data.push({
name:"User " + (data.length+1),
mobile:"9999999999",
age:20,
category:"Solo",
payment: Math.random() > 0.5 ? "paid" : "pending"
});

render();
}

render();
</script>

</body>
</html>
